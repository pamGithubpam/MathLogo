<div class="game-container">
  @if (isSequencedMode()) {
    <div class="category-controls">
      @for (category of selectedCategories(); track category; let i = $index) {
        <button
          type="button"
          class="category-button"
          [class.active]="currentCategoryIndex() === i"
          (click)="switchToCategory(i)">
          {{ i + 1 }}
        </button>
      }
      <button
        type="button"
        class="category-button mix-button"
        [class.active]="currentCategoryIndex() === -1"
        (click)="switchToMixedMode()">
        Mix
      </button>
    </div>
  }
  
  <div class="game-header">
    <button type="button" class="quit-button" (click)="quitGame()">Quitter</button>
  </div>
  @if (currentCalculation(); as calc) {
    <h2>{{ calc.text }}</h2>

    @if (calc.answer) {
      <div class="keyboard-container">
        <div class="keyboard-row">
          <div class="keypad-grid">
            <button type="button" (click)="addDigit('1')">1</button>
            <button type="button" (click)="addDigit('2')">2</button>
            <button type="button" (click)="addDigit('3')">3</button>
            <button type="button" (click)="addDigit('4')">4</button>
            <button type="button" (click)="addDigit('5')">5</button>
            <button type="button" (click)="addDigit('6')">6</button>
            <button type="button" (click)="addDigit('7')">7</button>
            <button type="button" (click)="addDigit('8')">8</button>
            <button type="button" (click)="addDigit('9')">9</button>
            <button type="button" (click)="deleteDigit()">←</button>
            <button type="button" (click)="addDigit('0')">0</button>
            <button type="button" (click)="clearAnswer()">C</button>
          </div>
          <div class="answer-box">
            <input type="text" [value]="userAnswer()" placeholder="Ta réponse" readonly>
            <button type="button" (click)="submitAnswer()">Valider</button>
            <div class="feedback-panel" *ngIf="feedbackImage()">
              <img [src]="feedbackImage()" [alt]="feedbackMessage()" />
              <span>{{ feedbackMessage() }}</span>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <button (click)="skip()">Suivant</button>
    }
  }

  @if (showReward()) {
    <div class="reward-overlay">
      <img [src]="rewardImage()" [alt]="rewardImage()">
    </div>
  }

  @if (showQuitPanel()) {
    <div class="quit-panel-overlay">
      <div class="quit-panel">
        <h2>Quitter le jeu ?</h2>
        <div class="quit-panel-buttons">
          <button type="button" class="btn-restart" (click)="returnToConfig()">
            Retour configuration
          </button>
          <button type="button" class="btn-new" (click)="newGame()">
            Nouveau jeu
          </button>
          <button type="button" class="btn-cancel" (click)="closeCancelQuitPanel()">
            Continuer
          </button>
        </div>
      </div>
    </div>
  }
</div>
