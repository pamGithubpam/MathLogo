<div class="end-container">
  <h1>Félicitations !</h1>
  <p>Vous avez terminé le jeu.<span *ngIf="showScore" class="inline-score"> Score final: {{ score }} / {{ total }}</span></p>
  <div class="buttons-container">
    <button class="btn-primary" (click)="restartSameConfig()">Recommencer</button>
    <button class="btn-secondary" (click)="newGame()">Nouveau jeu</button>
  </div>
</div>
